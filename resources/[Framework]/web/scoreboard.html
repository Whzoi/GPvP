<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="scoreboard.css">
</head>
<body>
    <div id="scoreboard" class="scoreboard-container" style="display: none;">
        <div class="team" id="team1">
            <div class="team-name">TEAM 1</div>
            <div class="team-score" id="team1-score">0</div>
            <div class="alive-count" id="team1-alive">0/0</div>
        </div>
        <div class="round-info">
            <div class="round-title">ROUND</div>
            <div class="round-number" id="round-number">0/5</div>
        </div>
        <div class="team" id="team2">
            <div class="team-name">TEAM 2</div>
            <div class="team-score" id="team2-score">0</div>
            <div class="alive-count" id="team2-alive">0/0</div>
        </div>
    </div>
    <script src="scoreboard.js"></script>
</body>
</html>
